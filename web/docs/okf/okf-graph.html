<script>
const DATA = {"nodes": [{"id": "app-shell.md", "title": "App shell & UI panels", "type": "Component", "description": "App.tsx \u2014 the single state owner, plus the HUD, toolbar, shot/control panels, and export preview.", "tags": "[react, ui, state]", "timestamp": "2026-06-27T00:00:00Z", "reserved": false, "body": "# App shell\n\n`App` (`src/App.tsx:87`) holds every piece of UI state with `useState`:\n- `viewerState: ViewerState` \u2014 valley/route ids, camera mode, quality, texture mode, vertical exaggeration, route visibility, selected shot.\n- `shots: SavedShot[]` \u2014 saved camera views, seeded from `initialShots`.\n- `currentCamera: CameraSnapshot` \u2014 live readout pushed up from the viewer via `onCameraChange`.\n- `status`, `replayPosition`, `isReplayPreviewing`, `loadedRoute`, `exportImageUrl`, `commands`.\n\nDerived values (`activeValley`, `activeRoute`, `selectedShot`) are `useMemo`'d off that state. See [data model](/data-model.md) for the shapes.\n\n# Schema\n\nSub-components (all in this file):\n- `TopBar` (`:289`) \u2014 valley / route / quality selects, share + export buttons, a status switch for previewing mock states.\n- `CameraToolbar` (`:395`) \u2014 segmented orbit / free-camera / route-follow, plus Frame route and Reset.\n- `Hud` (`:463`) \u2014 altitude, distance-to-route, mode, FOV, quality, heading, terrain label, route summary.\n- `ShotPanel` (`:505`) \u2014 saved-view list, add current view, toggle route, export.\n- `ControlPanel` (`:567`) \u2014 texture mode select, vertical-exaggeration slider, selected-shot detail.\n- `ReplayTimeline` (`:652`) \u2014 play/pause route-follow preview and scrub.\n- `ExportPreview` (`:698`) \u2014 modal showing the captured PNG with a download link.\n\n# Examples\n\n- **Save a shot** \u2014 `addShot` (`:139`) snapshots `currentCamera` + current `viewerState` into a new `SavedShot` (id `shot-${Date.now()}`) and selects it.\n- **Share link** \u2014 `copyShareLink` (`:176`) writes valley/route/mode/shot as query params to the clipboard. ponytail-grade: no router, just `URLSearchParams`.\n- **Replay loop** \u2014 an interval advances `replayPosition` while previewing and forces `cameraMode: \"route-follow\"` (`:156`).\n- **Export round-trip** \u2014 `requestImageExport` dispatches `trek-export-image`; a listener catches `trek-export-ready` and stores the `dataUrl` (`:165`). Handled in [terrain viewer](/terrain-viewer.md)."}, {"id": "architecture.md", "title": "Architecture & data flow", "type": "Architecture", "description": "How the App shell, three.js viewer, types, and streamed assets connect.", "tags": "[architecture, dataflow]", "timestamp": "2026-06-27T00:00:00Z", "reserved": false, "body": "# Architecture\n\nTwo-component app. [`App.tsx`](/app-shell.md) owns all UI state and renders the surrounding panels; [`TerrainViewer.tsx`](/terrain-viewer.md) owns the three.js scene and renders into a mounted `<div>`. Shared shapes live in [`types.ts`](/data-model.md). Initial valleys/shots come from [`mockData.ts`](/mock-data.md); heavy terrain/route assets are fetched at runtime from a per-valley `manifest.json`.\n\n# Schema\n\n```\nmain.tsx \u2192 <App/>\n  App (ViewerState, shots, status, currentCamera)\n   \u251c\u2500 <TerrainViewer/>  \u2190 props: valley, state, selectedShot, replayPosition, commands\n   \u2502     fetch manifest.json \u2192 terrain.json, route.json, border.json\n   \u2502     three.js scene (terrain mesh + route tube + border)\n   \u2502     onCameraChange(snapshot) \u2500\u2510\n   \u2502     onAssetsLoaded(route) \u2500\u2500\u2500\u2500\u2524\n   \u251c\u2500 <TopBar/>  valley/route/quality selects, share, export, status\n   \u251c\u2500 <CameraToolbar/>  orbit / free / route-follow, frame, reset\n   \u251c\u2500 <Hud/>  \u25c0\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518 camera readouts\n   \u251c\u2500 <ShotPanel/>  saved views, add, toggle route, export\n   \u251c\u2500 <ControlPanel/>  texture mode, vertical exaggeration\n   \u251c\u2500 <ReplayTimeline/>  route-follow scrub\n   \u2514\u2500 <ExportPreview/>  captured PNG\n```\n\n# Examples\n\nCross-component coordination uses three channels:\n- **Props down** \u2014 `App` passes `ViewerState` and a `commands` counter object to the viewer.\n- **Callbacks up** \u2014 `onCameraChange` / `onAssetsLoaded` push viewer-derived data back to `App`.\n- **Window CustomEvents** \u2014 image export is decoupled via `trek-export-image` (request) and `trek-export-ready` (result with `dataUrl`). See `App.tsx:166` and `TerrainViewer.tsx:246`.\n\nCommands (`frameRoute`, `reset`, `exportImage`) are fired by incrementing integer counters so the viewer's effect detects a change without a direct method call (`TerrainViewer.tsx:646`)."}, {"id": "data-model.md", "title": "Shared TypeScript types", "type": "Data Model", "description": "types.ts \u2014 the manifest, asset, viewer-state, and camera shapes shared across App and TerrainViewer.", "tags": "[types, schema]", "timestamp": "2026-06-27T00:00:00Z", "reserved": false, "body": "# Data model\n\nAll shared shapes live in `src/types.ts`. Used by both [`App.tsx`](/app-shell.md) and [`TerrainViewer.tsx`](/terrain-viewer.md).\n\n# Schema\n\n**Enums (string unions):**\n- `CameraMode` \u2014 `orbit | free-camera | route-follow`\n- `Quality` \u2014 `low | balanced | high` (drives mesh decimation + post-processing)\n- `TextureMode` \u2014 `topographic | raw-topo | lidar-shade | multi-shade | slope | hypsometric | surface`\n- `AppStatus` \u2014 `ready | loading | empty | error | unsupported`\n\n**Manifest / config:**\n- `ValleyManifest` (`:25`) \u2014 id, geographic `bounds`, `assetBase`, optional `reference` images, a large `terrain` block (DEM source, resolutions, smoothing sigmas, `gridSize`, extent in metres, min/max height), `defaultCamera`, `routes`, `qualityPresets`, `attribution`, `overlays`.\n- `RouteSummary` (`:16`) \u2014 lightweight route entry inside a manifest.\n- `SavedShot` (`:74`) \u2014 a persisted camera view (position, target, fov, exaggeration, texture, route visibility).\n- `ViewerState` (`:85`) \u2014 the live UI state object owned by `App`.\n\n**Runtime assets (fetched JSON):**\n- `RouteAsset` / `RoutePoint` (`:105`, `:96`) \u2014 full route geometry with scene `x/y/z`, distance `d`, and `lat/lon`.\n- `TerrainAsset` (`:118`) \u2014 the heightfield: `gridSize`, extent, min/max height, flat `heights[]`.\n- `BorderAsset` (`:127`) \u2014 colored polylines for overlays.\n- `CameraSnapshot` (`:134`) \u2014 derived readout pushed to the [HUD](/app-shell.md): position, target, fov, altitude, distance-to-route, heading."}, {"id": "dev-runbook.md", "title": "Dev & build runbook", "type": "Runbook", "description": "How to run, build, and preview the trek-camera-viewer app.", "tags": "[runbook, vite, build]", "timestamp": "2026-06-27T00:00:00Z", "reserved": false, "body": "# Dev & build runbook\n\nVite + React 19 SPA. Node + npm. Entry: `index.html` \u2192 `src/main.tsx` \u2192 [`<App/>`](/app-shell.md).\n\n# Examples\n\n```bash\nnpm install\nnpm run dev       # vite dev server, --host 0.0.0.0\nnpm run build     # tsc -b && vite build \u2192 dist/\nnpm run preview   # serve the production build, --host 0.0.0.0\n```\n\n# Citations\n\n- Scripts: `package.json:6`.\n- TypeScript project refs: `tsconfig.json` \u2192 `tsconfig.app.json` / `tsconfig.node.json`.\n- Vite config: `vite.config.ts` (React plugin).\n- Runtime terrain/route/texture assets are expected under `public/assets/<valley-id>/` (served at `/assets/...`); see [mock data](/mock-data.md) for the file list. They are generated by an upstream pipeline, not built here."}, {"id": "index.md", "title": "Trek Camera Viewer \u2014 Knowledge Bundle", "type": "Index", "description": "OKF v0.1 wiki for the trek-camera-viewer web app, a React + three.js LiDAR terrain and route camera tool.", "tags": "[react, threejs, terrain, viewer]", "timestamp": "2026-06-27T00:00:00Z", "reserved": true, "body": "# Trek Camera Viewer\n\nA single-page React 19 + Vite app that renders an exported LiDAR heightfield in three.js, draws a GPX-derived route over it, and lets the user frame, save, and export camera shots. All UI is mock-state driven; terrain/route assets stream from a per-valley manifest.\n\n## Concepts\n\n- [Architecture](/architecture.md) \u2014 how the pieces fit and the data flow\n- [App shell & UI panels](/app-shell.md) \u2014 `App.tsx` state owner and HUD/toolbar/panels\n- [Terrain viewer](/terrain-viewer.md) \u2014 `TerrainViewer.tsx` three.js render engine\n- [Data model](/data-model.md) \u2014 `types.ts` shared TypeScript types\n- [Mock data & manifests](/mock-data.md) \u2014 `mockData.ts` valleys and saved shots\n- [Dev & build runbook](/dev-runbook.md) \u2014 how to run, build, preview\n\n## Stack\n\nReact 19, TypeScript, Vite 6, three.js 0.185 (EffectComposer / FXAA / SSAO), lucide-react icons."}, {"id": "log.md", "title": "Update log", "type": "Log", "description": "Chronological history of this OKF bundle.", "tags": "", "timestamp": "2026-06-27T00:00:00Z", "reserved": true, "body": "# Log\n\n- 2026-06-27 \u2014 Initial bundle generated from src/ (App.tsx, TerrainViewer.tsx, types.ts, mockData.ts, main.tsx)."}, {"id": "mock-data.md", "title": "Mock data & valley manifests", "type": "Data Source", "description": "mockData.ts \u2014 seed valleys and saved shots; how runtime asset manifests are structured.", "tags": "[data, assets, manifest]", "timestamp": "2026-06-27T00:00:00Z", "reserved": false, "body": "# Mock data\n\n`src/mockData.ts` exports two seeds consumed by [`App.tsx`](/app-shell.md):\n\n- `valleys: ValleyManifest[]` (`:3`) \u2014 currently one valley, **Escursione mattutina** (Italian Alps, bounds `6.746,44.892 \u2192 6.822,44.934`). `assetBase: /assets/escursione-mattutina/`. Terrain is a 3000\u00b2 grid over ~5988\u00d74805 m, 1412\u20132637 m elevation, DEM = \"Piemonte ICE 2009-2011 DTM 5m + IGN LiDAR HD fill\". One route, 21.6 km / +1539 m / 30145 points.\n- `initialShots: SavedShot[]` (`:67`) \u2014 three saved views (Generated final, Wide valley, Ridge context) with hand-tuned camera positions and texture modes.\n\n# Schema\n\nThe inline `valleys` entry doubles as the fallback manifest, but [`TerrainViewer`](/terrain-viewer.md) re-fetches a `manifest.json` from `assetBase` at runtime and merges it (`TerrainViewer.tsx:299`). Expected asset files under `assetBase`:\n\n```\nmanifest.json        ValleyManifest (authoritative terrain/route paths)\nterrain.json         TerrainAsset heightfield\nroute.json           RouteAsset geometry\nborder.json          BorderAsset (optional, via overlays.border)\nheightmap.png        + per-mode textures: terrain-texture, -topo-raw,\n                     -hillshade, -multishade, -slope, -hypso, -normal\nreference-*.png/jpg  reference render + preview\n```\n\n# Citations\n\n`attribution` lists the DEM source, source GPX (`Escursione_mattutina.gpx`), and that the reference render was produced by `plot3d_pv.py` \u2014 i.e. these assets are generated by an upstream Python pipeline outside this repo."}, {"id": "terrain-viewer.md", "title": "Terrain viewer (three.js engine)", "type": "Component", "description": "TerrainViewer.tsx \u2014 asset loading, mesh/route/border construction, camera rig, render pipeline, and high-res export.", "tags": "[threejs, rendering, camera]", "timestamp": "2026-06-27T00:00:00Z", "reserved": false, "body": "# Terrain viewer\n\n`TerrainViewer` (`src/TerrainViewer.tsx:253`) is the imperative three.js layer. It keeps all GL objects in refs (renderer, composer, camera, scene, meshes, camera rig) and drives them from React effects keyed on `state`.\n\n# Schema\n\n**Asset loading** (`:289`) \u2014 fetches `${assetBase}manifest.json`, then in parallel `terrain.data` (heightfield JSON) and the matching route JSON, plus an optional border overlay. Resolves texture URLs per [`TextureMode`](/data-model.md) into `textureUrls`. Reports the loaded route up via `onAssetsLoaded`.\n\n**Geometry builders** (pure functions, top of file):\n- `buildTerrainGeometry` (`:113`) \u2014 decimates the `gridSize \u00d7 gridSize` heightfield by a `skip` factor (low=4, balanced=2, high=1), builds positions/colors/uvs/indices, computes normals. Color is an HSL ramp by normalized height.\n- `buildRouteObject` (`:176`) \u2014 a centripetal Catmull-Rom `TubeGeometry`, raised 28 m, red.\n- `buildBorderGroup` (`:194`) \u2014 same treatment for optional border polylines.\n\n**Coordinate mapping** \u2014 `localToScene` / `sceneToLocal` (`:76`, `:84`) convert between asset-space `[x, y, z(elev)]` and three.js scene space, applying `verticalExaggeration`. Note the y/z swap and the `depthM/2 - y` flip.\n\n**Camera rig** \u2014 a spherical `CameraRig` (`target, radius, theta, phi`). `computeRigFromCamera` (`:92`) derives it from a position+target; `applyRig` (`:103`) writes the camera position back. Pointer drag edits theta/phi, wheel edits radius (`:679`).\n\n**Render pipeline** (`:450`) \u2014 `EffectComposer` with `RenderPass`, optional `SSAOPass` (high only), `FXAAPass`. Quality `low` skips post-processing entirely.\n\n# Examples\n\n- **Camera modes** in the rAF loop (`:509`): `free-camera` does WASD/QE fly with forward/right vectors; `route-follow` lerps the camera along `routePoints` by `replayPosition`; default `orbit` just re-applies the rig.\n- **Live readout** \u2014 `reportCamera` (`:347`) throttled to ~220 ms, computes altitude, nearest route distance, and heading, then calls `onCameraChange` \u2192 [HUD](/app-shell.md).\n- **High-res export** \u2014 `exportRendererImage` (`:218`) temporarily resizes the renderer to 7200\u00d75400 at pixel ratio 1, renders, reads `toDataURL(\"image/png\")`, restores size, and dispatches `trek-export-ready`. Requires `preserveDrawingBuffer: true` on the renderer (`:381`).\n- **Texture hot-swap** \u2014 changing `textureMode` swaps `material.map`/`emissiveMap` without rebuilding the scene (`:593`); analysis textures (slope/hypso/shades) get higher emissive intensity.\n\n# Citations\n\nImports three.js postprocessing from `three/examples/jsm/postprocessing/*`. Pixel ratio capped at 3 for display (`:60`), export constants at `:61`."}], "edges": [{"source": "app-shell.md", "target": "data-model.md"}, {"source": "app-shell.md", "target": "terrain-viewer.md"}, {"source": "architecture.md", "target": "app-shell.md"}, {"source": "architecture.md", "target": "terrain-viewer.md"}, {"source": "architecture.md", "target": "data-model.md"}, {"source": "architecture.md", "target": "mock-data.md"}, {"source": "data-model.md", "target": "app-shell.md"}, {"source": "data-model.md", "target": "terrain-viewer.md"}, {"source": "data-model.md", "target": "app-shell.md"}, {"source": "dev-runbook.md", "target": "app-shell.md"}, {"source": "dev-runbook.md", "target": "mock-data.md"}, {"source": "index.md", "target": "architecture.md"}, {"source": "index.md", "target": "app-shell.md"}, {"source": "index.md", "target": "terrain-viewer.md"}, {"source": "index.md", "target": "data-model.md"}, {"source": "index.md", "target": "mock-data.md"}, {"source": "index.md", "target": "dev-runbook.md"}, {"source": "mock-data.md", "target": "app-shell.md"}, {"source": "mock-data.md", "target": "terrain-viewer.md"}, {"source": "terrain-viewer.md", "target": "data-model.md"}, {"source": "terrain-viewer.md", "target": "app-shell.md"}]};
const byId = Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
const backlinks = {}; DATA.edges.forEach(e=>{(backlinks[e.target]=backlinks[e.target]||[]).push(e.source)});
const cy = cytoscape({container:document.getElementById('cy'),
  elements:[...DATA.nodes.map(n=>({data:{id:n.id,label:n.title,reserved:n.reserved}})),
            ...DATA.edges.map(e=>({data:{source:e.source,target:e.target}}))],
  layout:{name:'cose',animate:false,padding:40,nodeRepulsion:9000,idealEdgeLength:130},
  style:[
   {selector:'node',style:{'label':'data(label)','color':'#e6edf3','font-size':11,'background-color':'#388bfd',
     'text-valign':'bottom','text-margin-y':4,'width':22,'height':22}},
   {selector:'node[?reserved]',style:{'background-color':'#6e7681','shape':'round-rectangle'}},
   {selector:'edge',style:{'width':1.5,'line-color':'#30363d','target-arrow-color':'#30363d',
     'target-arrow-shape':'triangle','curve-style':'bezier','arrow-scale':.8}},
   {selector:'.sel',style:{'background-color':'#f0883e','width':30,'height':30}}]});
function show(id){
  const n=byId[id]; if(!n)return;
  cy.nodes().removeClass('sel'); cy.getElementById(id).addClass('sel');
  const bk=(backlinks[id]||[]).map(s=>`<a class="bk" data-go="${s}">ŌåÉ ${byId[s].title}</a>`).join('')||'<em>none</em>';
  document.getElementById('panel').innerHTML=
    `<span class="type">${n.type}</span><h2>${n.title}</h2>`+
    `<div class="meta">${n.description||''}${n.tags?'<br>tags: '+n.tags:''}${n.timestamp?'<br>'+n.timestamp:''}</div>`+
    `<div class="body">${marked.parse(n.body)}</div><h3>Backlinks</h3>${bk}`;
}
cy.on('tap','node',e=>show(e.target.id()));
document.addEventListener('click',e=>{
  const go=e.target.getAttribute&&e.target.getAttribute('data-go'); if(go){show(go);return;}
  const href=e.target.tagName==='A'&&e.target.getAttribute('href');
  if(href){const t=href.replace(/^\.?\//,''); if(byId[t]){e.preventDefault();show(t);}}
});
show(DATA.nodes.find(n=>n.id==='index.md')?.id || DATA.nodes[0].id);
</script></body></html>
